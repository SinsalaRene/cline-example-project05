services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fw-portal-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/firewall_manager
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - DEBUG=True
      - ENVIRONMENT=development
      - AUTH_PROVIDER=azure_ad
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - DATABASE_SSL_MODE=prefer
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=20
      - CORS_ORIGINS=http://localhost:4200,http://localhost:3000
      - RATE_LIMIT_AUTH=5/minute
      - RATE_LIMIT_DEFAULT=100/minute
      - REQUEST_ID_HEADER=X-Request-ID
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migration_runner:
        condition: service_completed_successfully
    volumes:
      - backend_data:/app/data
    networks:
      - fw-portal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fw-portal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fw-portal-net
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: fw-portal-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=firewall_manager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fw-portal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: fw-portal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fw-portal-net
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fw-portal-celery
    command: celery -A app.tasks.base.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - backend
    networks:
      - fw-portal-net
    restart: unless-stopped

  migration_runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fw-portal-migration
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        python scripts/seed_data.py
      "
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/firewall_manager
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fw-portal-net
    restart: "no"

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fw-portal-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - fw-portal-net
    restart: unless-stopped

networks:
  fw-portal-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_data: